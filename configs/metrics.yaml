# QuantMap — Metric Registry (Layer 1)
# Canonical definitions of all measurement variables.
#
# This file is the SINGLE SOURCE OF TRUTH for metric semantics.
# It is version-controlled and treated as a maintainer-facing contract.
# Do NOT edit this file to change experimental priorities — use
# Experiment Profiles (Layer 2) for that.
#
# Changes to this file change WHAT a metric means, not how it is used.
# All changes require maintainer review.
#
# Schema: src/governance.py :: MetricDefinition

metrics:

  # -----------------------------------------------------------------------
  # Performance metrics — token generation throughput
  # -----------------------------------------------------------------------

  warm_tg_median:
    human_label: "Warm Token Generation (Median)"
    description: >
      Median predicted tokens per second across valid warm speed_short requests.
      Primary throughput indicator.
    units: "tokens/sec"
    metric_class: performance
    objective_direction: maximize
    rank_bearing_default: true
    diagnostic_only: false
    gate_capable: true
    score_capable: true
    pareto_capable: true
    report_only: false
    required: required
    missingness_policy: exclude_config
    missingness_note: "Primary metric; absence indicates data integrity failure."
    default_estimator: winsorized_mean
    default_outlier_policy: flag_symmetric
    outlier_fence_method: iqr_1_5
    both_tails_flagged: true
    default_transform: reference_based  # fallback: hardened_minmax
    fixed_reference_value: 30.0
    reference_provenance: "registry:generation_1"
    default_confidence_policy: lcb_k1
    min_sample_gate: 10
    experiment_family_tags: [all]
    profile_override_allowed:
      - rank_bearing
      - weight
      - gate_threshold

  warm_tg_p10:
    human_label: "Warm Token Generation (P10 — Worst-Case Floor)"
    description: >
      10th percentile of predicted tokens per second across valid warm
      speed_short requests. Represents worst-case sustained throughput.
    units: "tokens/sec"
    metric_class: performance
    objective_direction: maximize
    rank_bearing_default: true
    diagnostic_only: false
    gate_capable: true
    score_capable: true
    pareto_capable: false
    report_only: false
    required: required
    missingness_policy: exclude_config
    default_estimator: winsorized_mean
    default_outlier_policy: none  # p10 is already a robust tail statistic
    outlier_fence_method: none
    both_tails_flagged: false
    default_transform: reference_based
    fixed_reference_value: 25.0
    reference_provenance: "registry:generation_1"
    default_confidence_policy: lcb_k1  # SCHEMA GROUNDWORK — deferred to Phase 3.3
    min_sample_gate: 10
    experiment_family_tags: [all]
    profile_override_allowed:
      - rank_bearing
      - weight
      - gate_threshold

  # -----------------------------------------------------------------------
  # Latency metrics — time to first token
  # -----------------------------------------------------------------------

  warm_ttft_median_ms:
    human_label: "Warm TTFT (Median)"
    description: >
      Median time-to-first-token in milliseconds for warm speed_short requests.
      Primary responsiveness indicator.
    units: "ms"
    metric_class: latency
    objective_direction: minimize
    rank_bearing_default: true
    diagnostic_only: false
    gate_capable: false
    score_capable: true
    pareto_capable: true
    report_only: false
    required: optional
    missingness_policy: exclude_dimension_on_systemic_failure
    missingness_note: "Absence makes config unrankable but not eliminated."
    default_estimator: winsorized_mean
    default_outlier_policy: flag_symmetric
    outlier_fence_method: iqr_1_5
    both_tails_flagged: true
    default_transform: saturating_utility
    transform_params:
      curve_type: piecewise_linear
      x_saturated: 50.0  # ms (utility = 1.0)
      x_zero: 500.0      # ms (utility = 0.0)
    default_confidence_policy: lcb_k1
    min_sample_gate: 10
    experiment_family_tags: [all]
    profile_override_allowed:
      - rank_bearing
      - weight

  warm_ttft_p90_ms:
    human_label: "Warm TTFT (P90 — Tail Latency)"
    description: >
      90th percentile time-to-first-token for warm speed_short requests.
      Represents worst-case responsiveness.
    units: "ms"
    metric_class: latency
    objective_direction: minimize
    rank_bearing_default: true
    diagnostic_only: false
    gate_capable: true
    score_capable: true
    pareto_capable: false
    report_only: false
    required: optional
    missingness_policy: exclude_dimension_on_systemic_failure
    default_estimator: p90
    default_outlier_policy: none  # p90 is itself the tail
    outlier_fence_method: none
    both_tails_flagged: false
    default_transform: threshold_utility
    default_confidence_policy: lcb_k1
    min_sample_gate: 10
    experiment_family_tags: [all]
    profile_override_allowed:
      - rank_bearing
      - weight
      - gate_threshold

  cold_ttft_median_ms:
    human_label: "Cold TTFT (Median — First Impression)"
    description: >
      Median time-to-first-token for cold (first-in-cycle) requests.
      Measures model load/warmup responsiveness.
    units: "ms"
    metric_class: latency
    objective_direction: minimize
    rank_bearing_default: true
    diagnostic_only: false
    gate_capable: false
    score_capable: true
    pareto_capable: false
    report_only: false
    required: conditionally_applicable
    conditionality_note: "Only applicable when the request schedule includes cold requests."
    missingness_policy: substitute_if_structurally_inapplicable
    missingness_note: "If no cold requests in schedule, metric is N/A — not unrankable."
    default_estimator: median
    default_outlier_policy: flag_symmetric
    outlier_fence_method: iqr_1_5
    both_tails_flagged: true
    default_transform: saturating_utility
    transform_params:
      curve_type: piecewise_linear
      x_saturated: 100.0  # ms (utility = 1.0)
      x_zero: 2500.0     # ms (utility = 0.0)
    default_confidence_policy: lcb_k1
    min_sample_gate: 5
    experiment_family_tags: [all]
    profile_override_allowed:
      - rank_bearing
      - weight

  # -----------------------------------------------------------------------
  # Prompt processing throughput
  # -----------------------------------------------------------------------

  pp_median:
    human_label: "Prompt Processing Throughput (Median)"
    description: >
      Median prompt tokens processed per second for warm speed_short requests.
      Secondary throughput indicator.
    units: "tokens/sec"
    metric_class: performance
    objective_direction: maximize
    rank_bearing_default: true
    diagnostic_only: false
    gate_capable: false
    score_capable: true
    pareto_capable: false
    report_only: false
    required: optional
    missingness_policy: exclude_dimension_on_systemic_failure
    default_estimator: winsorized_mean
    default_outlier_policy: flag_symmetric
    outlier_fence_method: iqr_1_5
    both_tails_flagged: true
    default_transform: reference_based
    fixed_reference_value: 500.0
    reference_provenance: "registry:generation_1"
    default_confidence_policy: lcb_k1
    min_sample_gate: 5
    experiment_family_tags: [throughput, diagnostic]
    profile_override_allowed:
      - rank_bearing
      - weight

  # -----------------------------------------------------------------------
  # Stability / reliability metrics — gate-only (not in composite score)
  # -----------------------------------------------------------------------

  warm_tg_cv:
    human_label: "Warm TG Coefficient of Variation"
    description: >
      Standard deviation divided by mean of warm TG values (ddof=1).
      Measures run-to-run consistency. Used as an elimination gate.
    units: "ratio"
    metric_class: stability
    objective_direction: minimize
    rank_bearing_default: false
    diagnostic_only: true
    gate_capable: true
    score_capable: false
    pareto_capable: false
    report_only: false
    required: required
    missingness_policy: exclude_config
    missingness_note: "Uncomputable CV = structurally unknown variability = eliminated."
    default_estimator: mean  # CV is std/mean by definition
    default_outlier_policy: none
    outlier_fence_method: none
    both_tails_flagged: false
    default_transform: none
    default_confidence_policy: none
    min_sample_gate: 2
    experiment_family_tags: [stability, all]
    profile_override_allowed:
      - gate_threshold

  thermal_events:
    human_label: "Thermal Throttling Events"
    description: >
      Count of telemetry samples with power_limit_throttling=1 or
      cpu_temp_c >= 100°C during all attempted cycles (valid and invalid).
    units: "count"
    metric_class: environmental
    objective_direction: threshold_pass_fail
    rank_bearing_default: false
    diagnostic_only: true
    gate_capable: true
    score_capable: false
    pareto_capable: false
    report_only: false
    required: required
    missingness_policy: exclude_config
    default_estimator: count
    default_outlier_policy: none
    outlier_fence_method: none
    both_tails_flagged: false
    default_transform: none
    default_confidence_policy: none
    min_sample_gate: 0  # Gate metric — any value is valid
    experiment_family_tags: [thermal, all]
    profile_override_allowed:
      - gate_threshold

  success_rate:
    human_label: "Request Success Rate"
    description: >
      Fraction of successful requests out of total attempted requests
      from completed cycles.
    units: "ratio"
    metric_class: stability
    objective_direction: threshold_pass_fail
    rank_bearing_default: false
    diagnostic_only: true
    gate_capable: true
    score_capable: false
    pareto_capable: false
    report_only: false
    required: required
    missingness_policy: exclude_config
    missingness_note: "None success_rate = no complete-cycle data = eliminated."
    default_estimator: mean  # success_rate = sum(success) / sum(attempted)
    default_outlier_policy: none
    outlier_fence_method: none
    both_tails_flagged: false
    default_transform: none
    default_confidence_policy: none
    min_sample_gate: 0  # Gate metric
    experiment_family_tags: [all]
    profile_override_allowed:
      - gate_threshold

  outlier_count:
    human_label: "Outlier Count (Warm TG)"
    description: >
      Number of warm TG values falling below Q1 - 1.5*IQR.
      Phase 3.2 will add symmetric upper-fence counting.
    units: "count"
    metric_class: stability
    objective_direction: threshold_pass_fail
    rank_bearing_default: false
    diagnostic_only: true
    gate_capable: true
    score_capable: false
    pareto_capable: false
    report_only: false
    required: required
    missingness_policy: warning_only
    default_estimator: count
    default_outlier_policy: none
    outlier_fence_method: iqr_1_5
    both_tails_flagged: true
    default_transform: none
    default_confidence_policy: none
    min_sample_gate: 4  # IQR requires at least 4 samples
    experiment_family_tags: [all]
    profile_override_allowed:
      - gate_threshold
